steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-chatbot:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-chatbot:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/ai-chatbot:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/ai-chatbot:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ai-chatbot
      - '--image=gcr.io/$PROJECT_ID/ai-chatbot:$COMMIT_SHA'
      - '--region=asia-northeast3'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-secrets=MONGODB_URI=MONGODB_URI:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest'
      - '--set-env-vars=NEXT_PUBLIC_API_URL=https://ai-chatbot-HASH-an.a.run.app'

images:
  - 'gcr.io/$PROJECT_ID/ai-chatbot:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/ai-chatbot:latest'
